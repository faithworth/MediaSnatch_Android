name: Build MediaSnatch APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3. Setup Flutter (this already handles Android SDK)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true

      # 4. Verify tools exist
      - name: Check versions
        run: |
          flutter --version
          dart --version

      # 5. Install dependencies
      - name: Get dependencies
        run: flutter pub get

      # 6. Fix Gradle permission
      - name: Fix Gradle
        run: chmod +x android/gradlew

      # 7. Build APK
      - name: Build APK
        run: flutter build apk --release --split-per-abi

      # 8. Upload APK
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: mediasnatch-apk
          path: build/app/outputs/flutter-apk/*.apk
