name: Build MediaSnatch APK (Stable)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mediasnatch_flutter

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Java (required for Gradle)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # 3. Install Android SDK components explicitly (CRITICAL)
      - name: Setup Android SDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" \
                     "platforms;android-33" \
                     "build-tools;33.0.2" \
                     "ndk;25.1.8937393"

      # 4. Flutter setup
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: stable
          cache: true

      # 5. Verify environment
      - name: Flutter Doctor
        run: flutter doctor -v

      # 6. Clean (important for your project)
      - name: Clean project
        run: flutter clean

      # 7. Dependencies
      - name: Install dependencies
        run: flutter pub get

      # 8. Fix Gradle permissions (Linux issue)
      - name: Fix Gradle permissions
        run: chmod +x android/gradlew

      # 9. Build APKs (ABI split = best for Tecno Pop 7)
      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi --verbose

      # 10. Build universal APK (fallback)
      - name: Build Universal APK
        run: flutter build apk --release

      # 11. Build AAB (Play Store)
      - name: Build App Bundle
        run: flutter build appbundle --release

      # 12. Upload artifacts
      - name: Upload builds
        uses: actions/upload-artifact@v4
        with:
          name: mediasnatch-builds
          path: |
            mediasnatch_flutter/build/app/outputs/flutter-apk/*.apk
            mediasnatch_flutter/build/app/outputs/bundle/release/*.aab
          path: |
            mediasnatch_flutter/build/app/outputs/flutter-apk/*.apk
            mediasnatch_flutter/build/app/outputs/bundle/release/*.aab
