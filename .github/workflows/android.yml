name: Build MediaSnatch APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mediasnatch_flutter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Flutter
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: flutter-${{ runner.os }}-${{ hashFiles('mediasnatch_flutter/pubspec.lock') }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: stable

      - name: Flutter Doctor
        run: flutter doctor

      - name: Get dependencies
        run: flutter pub get

      - name: Clean
        run: flutter clean

      - name: Build APK (split per ABI)
        run: flutter build apk --release --split-per-abi

      - name: Build Universal APK
        run: flutter build apk --release

      - name: Build AAB
        run: flutter build appbundle --release

      - name: Upload builds
        uses: actions/upload-artifact@v4
        with:
          name: mediasnatch-builds
          path: |
            mediasnatch_flutter/build/app/outputs/flutter-apk/*.apk
            mediasnatch_flutter/build/app/outputs/bundle/release/*.aab
